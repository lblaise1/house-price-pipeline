name: Terraform plan (dev)

# Runs on pull requests touching infra/.
# Read-only: produces a plan, comments it on the PR, never applies.

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - '.terraform-version'
      - '.github/workflows/terraform-plan.yml'

# Required for OIDC. read-only on contents because we don't push back.
permissions:
  id-token: write
  contents: read
  pull-requests: write   # so we can comment the plan back on the PR

concurrency:
  group: terraform-plan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: Plan dev
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/envs/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read pinned Terraform version
        id: tfver
        run: echo "version=$(cat ../../../.terraform-version)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::923347312486:role/github-actions-deployer
          aws-region: us-east-1
          role-session-name: GHA-plan-${{ github.run_id }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive ../../

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/envs/dev/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n... (output truncated)'
              : plan;
            const body = [
              '### Terraform plan — dev',
              '',
              '```',
              truncated,
              '```'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code != '0'
        run: exit 1
